<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CXL AC | Member Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@300;500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root {
            --bg-dark: #050506;
            --sidebar-bg: #0c0c0e;
            --card-bg: #111114;
            --border-color: rgba(255, 255, 255, 0.05);
            --accent-red: #ff3e3e;
            --accent-blue: #3e8eff;
            --accent-green: #2ecc71;
            --text-main: #ffffff;
            --text-dim: #888888;
            --sidebar-width: 280px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: var(--sidebar-width);
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 40px 25px;
            z-index: 100;
        }

        .logo {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--text-main);
            margin-bottom: 60px;
            display: flex;
            align-items: center;
            gap: 12px;
            letter-spacing: 2px;
        }

        .logo span {
            color: var(--accent-red);
        }

        .nav-menu {
            list-style: none;
            flex-grow: 1;
        }

        .nav-item {
            padding: 16px 20px;
            border-radius: 14px;
            margin-bottom: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 15px;
            color: var(--text-dim);
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .nav-item:hover,
        .nav-item.active {
            background: rgba(255, 62, 62, 0.05);
            color: var(--text-main);
        }

        .nav-item.active {
            box-shadow: 0 0 20px rgba(255, 62, 62, 0.1);
            color: var(--accent-red);
        }

        /* Main Content */
        .main-container {
            flex-grow: 1;
            overflow-y: auto;
            padding: 60px;
            background: radial-gradient(circle at top right, rgba(255, 62, 62, 0.03) 0%, transparent 40%);
        }

        .view {
            display: none;
            animation: fadeIn 0.4s ease-out;
        }

        .view.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(15px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            margin-bottom: 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2.2rem;
            font-weight: 700;
        }

        .header p {
            color: var(--text-dim);
            margin-top: 5px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px;
            margin-bottom: 50px;
        }

        .stat-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 30px;
            border-radius: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: border-color 0.3s;
        }

        .stat-card:hover {
            border-color: rgba(255, 255, 255, 0.1);
        }

        .stat-info h3 {
            font-size: 0.8rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 12px;
        }

        .stat-info .val {
            font-size: 2.2rem;
            font-weight: 800;
            font-family: 'Space Grotesk', sans-serif;
        }

        /* Table Styles */
        .table-container {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            overflow: hidden;
            backdrop-filter: blur(10px);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            padding: 25px;
            color: var(--text-dim);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-bottom: 1px solid var(--border-color);
        }

        td {
            padding: 25px;
            border-bottom: 1px solid var(--border-color);
            vertical-align: middle;
        }

        .pin-code {
            font-weight: 700;
            color: #fff;
            font-family: monospace;
            letter-spacing: 1px;
        }

        .type-badge {
            padding: 4px 12px;
            border-radius: 50px;
            font-size: 0.7rem;
            font-weight: 700;
            background: rgba(255, 255, 255, 0.05);
        }

        .status-pill {
            padding: 6px 14px;
            border-radius: 50px;
            font-size: 0.7rem;
            font-weight: 700;
            display: inline-block;
        }

        .status-cheating {
            background: rgba(255, 62, 62, 0.1);
            color: var(--accent-red);
            border: 1px solid rgba(255, 62, 62, 0.2);
        }

        .status-legit {
            background: rgba(46, 204, 113, 0.1);
            color: var(--accent-green);
            border: 1px solid rgba(46, 204, 113, 0.2);
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: var(--sidebar-bg);
            border: 1px solid var(--border-color);
            padding: 50px;
            border-radius: 30px;
            max-width: 450px;
            width: 100%;
            text-align: center;
        }

        select {
            width: 100%;
            padding: 18px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: #fff;
            margin-bottom: 25px;
            outline: none;
            transition: 0.3s;
        }

        select:focus {
            border-color: var(--accent-red);
        }

        .create-btn {
            background: var(--accent-red);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }

        .create-btn:hover {
            transform: scale(1.05);
            filter: brightness(1.1);
            box-shadow: 0 10px 20px rgba(255, 62, 62, 0.2);
        }

        /* Login Overlay */
        #login-overlay {
            position: fixed;
            inset: 0;
            background: var(--bg-dark);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(20px);
        }

        .login-box {
            background: var(--sidebar-bg);
            border: 1px solid var(--border-color);
            padding: 50px;
            border-radius: 30px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        .login-box input {
            width: 100%;
            padding: 18px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: #fff;
            margin: 25px 0;
            text-align: center;
            font-size: 1.2rem;
            letter-spacing: 5px;
            outline: none;
        }

        .login-box input:focus {
            border-color: var(--accent-red);
        }

        body.authenticated #login-overlay {
            display: none;
        }

        body.authenticated .sidebar,
        body.authenticated .main-container {
            display: flex;
        }

        body:not(.authenticated) .sidebar,
        body:not(.authenticated) .main-container {
            display: none;
        }
    </style>
</head>

<body class="">
    <!-- Login Overlay -->
    <div id="login-overlay">
        <div class="login-box">
            <h2 style="font-family: 'Space Grotesk'; margin-bottom: 10px;">CXL<span>AC</span> Member</h2>
            <p style="color: var(--text-dim); font-size: 0.9rem;">Please enter your MAK key to access the dashboard.</p>
            <input type="text" id="admin-password" placeholder="MAK-XXXXXXXXXXX" style="letter-spacing: 2px;">
            <button class="create-btn" style="width: 100%;" onclick="checkLogin()">VERIFY & ENTER</button>
            <p id="login-error" style="color: var(--accent-red); margin-top: 15px; font-size: 0.8rem; display: none;">Invalid or Already Bound Key</p>
        </div>
    </div>
    <div class="sidebar">
        <a href="index.html" class="logo" style="text-decoration: none;">CXL<span>AC</span></a>
        <ul class="nav-menu" style="margin-top: 20px;">
            <li class="nav-item active" onclick="showView('home')">
                <i class="fas fa-chart-pie"></i> OVERVIEW
            </li>
        </ul>
    </div>

    <div class="main-container">
        <!-- View: Home -->
        <div id="view-home" class="view active">
            <div class="header">
                <div>
                    <h1>System Overview</h1>
                    <p>Real-time audit monitoring and key management.</p>
                </div>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-info">
                        <h3>Total Audits</h3>
                        <div class="val" id="stat-total">0</div>
                    </div>
                    <div class="stat-icon" style="color: grey;"><i class="fas fa-microchip"></i></div>
                </div>
                <div class="stat-card">
                    <div class="stat-info">
                        <h3>Cheaters</h3>
                        <div class="val" id="stat-detections" style="color: var(--accent-red);">0</div>
                    </div>
                    <div class="stat-icon" style="color: var(--accent-red);"><i class="fas fa-user-slash"></i></div>
                </div>
                <div class="stat-card">
                    <div class="stat-info">
                        <h3>Active Keys</h3>
                        <div class="val" id="stat-keys">0</div>
                    </div>
                    <div class="stat-icon" style="color: var(--accent-blue);"><i class="fas fa-key"></i></div>
                </div>
            </div>

            <h2 style="margin-bottom: 25px; font-family: 'Space Grotesk';">Recent Audit Logs</h2>
            <div class="table-container">
                <table id="recent-logs-table">
                    <thead>
                        <tr>
                            <th>KEY</th>
                            <th>Status</th>
                            <th>Time</th>
                            <th>ACTION</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Modal: Audit Details -->
    <div id="details-modal" class="modal">
        <div class="login-box" style="max-width: 600px; text-align: left;">
            <h2 style="font-family: 'Space Grotesk'; margin-bottom: 20px;">Audit Details</h2>
            <div id="details-content" style="max-height: 400px; overflow-y: auto;">
                <!-- Filled by JS -->
            </div>
            <button class="create-btn" style="width: 100%; margin-top: 25px;" onclick="closeDetails()">CLOSE</button>
        </div>
    </div>

    <script>
        let socket;
        try {
            socket = typeof io !== 'undefined' ? io() : null;
        } catch (e) {
            console.warn('Socket.io not available');
        }

        let logs = [];

        // Simple Browser Fingerprint
        function getFingerprint() {
            try {
                let fp = localStorage.getItem('cxl_fp');
                if (!fp) {
                    fp = 'WEB-' + Math.random().toString(36).substring(2, 12) + '-' + Date.now();
                    localStorage.setItem('cxl_fp', fp);
                }
                return fp;
            } catch (e) {
                return 'EPHEMERAL-' + Math.random().toString(36).substring(2, 12);
            }
        }

        async function checkLogin() {
            const pin = document.getElementById('admin-password').value.trim();
            const browserFingerprint = getFingerprint();

            if (!pin) return;

            try {
                const res = await fetch('/api/member-login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ pin, browserFingerprint })
                });
                const data = await res.json();

                if (data.valid) {
                    sessionStorage.setItem('cxl_member_auth', pin);
                    document.body.classList.add('authenticated');
                    init();
                } else {
                    const errorEl = document.getElementById('login-error');
                    errorEl.textContent = data.message || 'Invalid Access Key';
                    errorEl.style.display = 'block';
                }
            } catch (err) {
                console.error(err);
                const errorEl = document.getElementById('login-error');
                errorEl.textContent = 'Connection Error: Is the server running?';
                errorEl.style.display = 'block';
            }
        }

        function checkSession() {
            if (sessionStorage.getItem('cxl_member_auth')) {
                document.body.classList.add('authenticated');
                init();
            }
        }

        // Run on load
        checkSession();

        async function init() {
            if (!document.body.classList.contains('authenticated')) return;
            try {
                await fetchLogs();
            } catch (e) {
                console.warn('Backend fetch failed (likely local file mode)');
            }
        }

        async function fetchLogs() {
            try {
                const res = await fetch('/api/logs');
                logs = await res.json();
                logs.sort((a, b) => b.timestamp.localeCompare(a.timestamp));
                populateLogs();
                updateDashboardStats();
            } catch (e) {}
        }


        function updateDashboardStats() {
            const totalEl = document.getElementById('stat-total');
            const detEl = document.getElementById('stat-detections');
            
            if (totalEl) totalEl.textContent = logs.length;
            if (detEl) detEl.textContent = logs.filter(l => l.status === 'Cheating').length;
        }

        function populateLogs() {
            const tbody = document.querySelector('#recent-logs-table tbody');
            if (!tbody) return;
            tbody.innerHTML = '';
            logs.slice(0, 50).forEach((log, index) => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="pin-code">${log.pin}</td>
                    <td><span class="status-pill status-${log.status.toLowerCase()}">${log.status}</span></td>
                    <td style="color: var(--text-dim)">${new Date(log.timestamp).toLocaleTimeString()}</td>
                    <td><button class="create-btn" style="padding: 8px 15px; font-size: 0.75rem;" onclick="showDetails(${index})">DETAILS</button></td>
                `;
                tbody.appendChild(tr);
            });
        }

        function showDetails(index) {
            const log = logs[index];
            const content = document.getElementById('details-content');
            content.innerHTML = `
                <div style="background: rgba(255,255,255,0.05); padding: 20px; border-radius: 12px; margin-bottom: 20px;">
                    <p style="color: var(--accent-red); font-weight: 700;">SYSTEM INFO</p>
                    <p style="margin-top: 10px;">OS: ${log.pcInfo ? log.pcInfo.os : 'N/A'}</p>
                    <p>User: ${log.pcInfo ? log.pcInfo.user : 'N/A'}</p>
                    <p style="font-size: 0.8rem; opacity: 0.6;">HWID: ${log.pcInfo ? log.pcInfo.hwid : 'N/A'}</p>
                </div>
                <div style="background: rgba(255,255,255,0.05); padding: 20px; border-radius: 12px;">
                    <p style="color: var(--accent-blue); font-weight: 700;">FILES FOUND</p>
                    <div style="margin-top: 10px; font-family: monospace; font-size: 0.85rem;">
                        ${log.files && log.files.length > 0 ? log.files.map(f => `<p style="margin-bottom: 5px;">> ${f}</p>`).join('') : '<p style="color: grey;">No cheat files detected.</p>'}
                    </div>
                </div>
            `;
            document.getElementById('details-modal').style.display = 'flex';
        }

        function closeDetails() { document.getElementById('details-modal').style.display = 'none'; }
        function showView(viewId) {} // Members only have one view now

        if (socket) {
            socket.on('new-log', log => { logs.unshift(log); populateLogs(); updateDashboardStats(); });
        }

        init();
    </script>
</body>

</html>
